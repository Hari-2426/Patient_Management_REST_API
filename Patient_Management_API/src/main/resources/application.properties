spring.application.name=Patient_Management_API
spring.datasource.username=your_dbname

spring.datasource.password=your_dbpassword
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/patient_db
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.file.name=patient.log

logging.level.com.patient=DEBUG

